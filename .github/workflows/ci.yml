name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  check-dependency:
    name: check-dependency
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      has_dependency: ${{ steps.parse.outputs.has_dependency }}
      core_branch: ${{ steps.parse.outputs.core_branch }}
      core_pr_number: ${{ steps.parse.outputs.core_pr_number }}
    steps:
      - name: Parse PR body for hegel-core dependency
        id: parse
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MATCH=$(echo "$PR_BODY" | grep -oP 'Depends on https://github\.com/hegeldev/hegel-core/pull/\K[0-9]+' || true)
          if [ -n "$MATCH" ]; then
            echo "has_dependency=true" >> "$GITHUB_OUTPUT"
            echo "core_pr_number=$MATCH" >> "$GITHUB_OUTPUT"
            # Fetch the PR branch name
            BRANCH=$(gh api "repos/hegeldev/hegel-core/pulls/$MATCH" --jq '.head.ref')
            echo "core_branch=$BRANCH" >> "$GITHUB_OUTPUT"
            echo "Found hegel-core dependency: PR #$MATCH (branch: $BRANCH)"
          else
            echo "has_dependency=false" >> "$GITHUB_OUTPUT"
            echo "No hegel-core dependency found"
          fi

  lint:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/base
        with:
          ssh-key: ${{ secrets.HEGEL_DEPLOY_KEY }}

      - name: Install Rust
        run: rustup toolchain install stable -c rustfmt -c clippy
      - uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db # v2

      - name: Check formatting
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-features --tests -- -D warnings
      - name: Install zizmor
        run: pipx install zizmor==1.23.1
      - name: Run zizmor
        run: zizmor --format plain .github/

  test:
    name: test (${{ matrix.rust }})
    needs: [check-dependency]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        rust: ["1.86", stable]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/base
        with:
          ssh-key: ${{ secrets.HEGEL_DEPLOY_KEY }}

      - name: Install Rust
        run: rustup toolchain install ${{ matrix.rust }} --profile minimal && rustup default ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db # v2

      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6

      - name: Install hegel-core from PR branch
        if: needs.check-dependency.outputs.has_dependency == 'true'
        env:
          CORE_BRANCH: ${{ needs.check-dependency.outputs.core_branch }}
        run: |
          uv venv .hegel/venv
          uv pip install --python .hegel/venv/bin/python "hegel-core @ git+https://github.com/hegeldev/hegel-core.git@${CORE_BRANCH}"
          echo "HEGEL_SERVER_COMMAND=$PWD/.hegel/venv/bin/hegel" >> "$GITHUB_ENV"

      - name: Run tests
        run: RUST_BACKTRACE=1 cargo test

  test-all-features:
    name: test-all-features (${{ matrix.rust }})
    needs: [check-dependency]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        rust: ["1.86", stable]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/base
        with:
          ssh-key: ${{ secrets.HEGEL_DEPLOY_KEY }}

      - name: Install Rust
        run: rustup toolchain install ${{ matrix.rust }} --profile minimal && rustup default ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db # v2

      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6

      - name: Install hegel-core from PR branch
        if: needs.check-dependency.outputs.has_dependency == 'true'
        env:
          CORE_BRANCH: ${{ needs.check-dependency.outputs.core_branch }}
        run: |
          uv venv .hegel/venv
          uv pip install --python .hegel/venv/bin/python "hegel-core @ git+https://github.com/hegeldev/hegel-core.git@${CORE_BRANCH}"
          echo "HEGEL_SERVER_COMMAND=$PWD/.hegel/venv/bin/hegel" >> "$GITHUB_ENV"

      - name: Run tests with all features
        run: RUST_BACKTRACE=1 cargo test --all-features

  docs:
    name: docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/base
        with:
          ssh-key: ${{ secrets.HEGEL_DEPLOY_KEY }}

      - uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db # v2

      - name: Build docs
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --all-features --no-deps

  coverage:
    name: coverage
    needs: [check-dependency]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/base
        with:
          ssh-key: ${{ secrets.HEGEL_DEPLOY_KEY }}

      - name: Install Rust components
        run: rustup component add llvm-tools-preview
      - uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db # v2

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov

      - name: Install just
        run: sudo apt-get update && sudo apt-get install -y just
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6

      - name: Install hegel-core from PR branch
        if: needs.check-dependency.outputs.has_dependency == 'true'
        env:
          CORE_BRANCH: ${{ needs.check-dependency.outputs.core_branch }}
        run: |
          uv venv .hegel/venv
          uv pip install --python .hegel/venv/bin/python "hegel-core @ git+https://github.com/hegeldev/hegel-core.git@${CORE_BRANCH}"
          echo "HEGEL_SERVER_COMMAND=$PWD/.hegel/venv/bin/hegel" >> "$GITHUB_ENV"

      - name: Run coverage
        run: RUST_BACKTRACE=1 just coverage

  conformance:
    name: conformance
    needs: [check-dependency]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/base
        with:
          ssh-key: ${{ secrets.HEGEL_DEPLOY_KEY }}

      - uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db # v2

      - name: Install just
        run: sudo apt-get update && sudo apt-get install -y just
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6

      - name: Install hegel-core from PR branch
        if: needs.check-dependency.outputs.has_dependency == 'true'
        env:
          CORE_BRANCH: ${{ needs.check-dependency.outputs.core_branch }}
        run: |
          uv venv .hegel/venv
          uv pip install --python .hegel/venv/bin/python "hegel-core @ git+https://github.com/hegeldev/hegel-core.git@${CORE_BRANCH}"
          echo "HEGEL_SERVER_COMMAND=$PWD/.hegel/venv/bin/hegel" >> "$GITHUB_ENV"

      - name: Run conformance tests
        run: just conformance

  nix:
    name: nix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/base
        with:
          ssh-key: ${{ secrets.HEGEL_DEPLOY_KEY }}
      - uses: cachix/install-nix-action@ba0dd844c9180cbf77aa72a116d6fbc515d0e87b # v27
      - name: Install just
        run: sudo apt-get update && sudo apt-get install -y just
      - name: lint
        run: just check-format-nix

  dependency-merged:
    name: dependency-merged
    needs: [check-dependency]
    if: github.event_name == 'pull_request' && needs.check-dependency.outputs.has_dependency == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check that linked hegel-core PR is merged
        env:
          CORE_PR_NUMBER: ${{ needs.check-dependency.outputs.core_pr_number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MERGED=$(gh api "repos/hegeldev/hegel-core/pulls/${CORE_PR_NUMBER}" --jq '.merged')
          if [ "$MERGED" != "true" ]; then
            echo "::warning::Linked hegel-core PR #${CORE_PR_NUMBER} has not been merged yet. Merge it before merging this PR."
          else
            echo "Linked hegel-core PR #${CORE_PR_NUMBER} is merged."
          fi

  release:
    name: release
    if: github.event_name == 'push' && github.repository == 'hegeldev/hegel-rust'
    needs: [lint, test, test-all-features, docs, coverage, conformance, nix]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # id-token: "enables the workflow to request and use an OIDC token from GitHub's OIDC provider".
      # Used by our trusted publishing flow
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Check for RELEASE.md
        id: check
        run: |
          if [ ! -f RELEASE.md ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate app token
        if: steps.check.outputs.skip != 'true'
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        id: app-token
        with:
          app-id: ${{ vars.HEGEL_RELEASE_APP_ID }}
          private-key: ${{ secrets.HEGEL_RELEASE_APP_PRIVATE_KEY }}
          repositories: hegel-rust

      - name: Re-checkout with app token # zizmor: ignore[artipacked]
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Release
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          HEGEL_RELEASE_APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: python .github/scripts/release.py release

      - name: Install Rust
        if: steps.check.outputs.skip != 'true'
        run: rustup toolchain install stable --profile minimal

      - name: Authenticate with crates.io
        if: steps.check.outputs.skip != 'true'
        uses: rust-lang/crates-io-auth-action@b7e9a28eded4986ec6b1fa40eeee8f8f165559ec # v1.0.3
        id: crates-io-auth

      - name: Publish hegeltest-macros
        if: steps.check.outputs.skip != 'true'
        run: cargo publish -p hegeltest-macros
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}

      - name: Wait for crates.io index
        if: steps.check.outputs.skip != 'true'
        run: |
          VERSION=$(grep '^version' hegel-macros/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "waiting for hegeltest-macros $VERSION to appear on crates.io..."
          for i in $(seq 1 60); do
            if cargo search hegeltest-macros | grep -q "\"$VERSION\""; then
              exit 0
            fi
            sleep 3
          done
          echo "Timed out waiting for hegeltest-macros to appear on Crates.io"
          exit 1

      - name: Publish hegeltest
        if: steps.check.outputs.skip != 'true'
        run: cargo publish -p hegeltest
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}
